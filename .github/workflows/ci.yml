name: CI


on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v4
        
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install --legacy-peer-deps
      - name: SonarCloud — Prepare
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          cat > sonar-project.properties <<'EOF'
          sonar.projectKey=CaioSeniuk_aula-pipeline
          sonar.organization=caioseniuk
          sonar.sources=.
          sonar.tests=.
          sonar.javascript.lcov.reportPaths=coverage/lcov.info
          EOF

      - name: Verificar qualidade
        run: npx eslint .

      - name: Run tests with coverage
        run: npm test -- --coverage

      - name: Install SonarScanner CLI
        run: npm install -g sonar-scanner

      - name: SonarCloud — Analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: sonar-scanner -Dsonar.login=$SONAR_TOKEN -Dsonar.host.url=https://sonarcloud.io

      - name: SonarCloud — Publish (wait Quality Gate)
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sudo apt-get update && sudo apt-get install -y jq >/dev/null
          echo "Polling SonarCloud for Quality Gate (timeout 5m)..."
          for i in {1..30}; do
            status=$(curl -s -u $SONAR_TOKEN: "https://sonarcloud.io/api/qualitygates/project_status?projectKey=CaioSeniuk_aula-pipeline" | jq -r .projectStatus.status)
            echo "Quality Gate status: $status"
            if [ "$status" != "IN_PROGRESS" ]; then break; fi
            sleep 10
          done
          if [ "$status" != "OK" ]; then echo "Quality gate failed: $status"; exit 1; fi